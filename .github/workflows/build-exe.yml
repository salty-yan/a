# GitHub Actions: 自动构建 Windows .exe
# 每次推送代码到 main 分支时，自动在云端 Windows 环境打包
# 构建产物可在 Actions → 对应运行记录 → Artifacts 中下载

name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查环境
        run: |
          python --version
          pip list | findstr -i "pyqt5 matplotlib pyinstaller pillow"
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import matplotlib; print('matplotlib OK')"
          python -c "from PIL import Image; print('Pillow OK')"

      - name: 使用 PyInstaller 打包
        run: |
          python build_exe.py

      - name: 上传 exe 产物
        uses: actions/upload-artifact@v4
        with:
          name: TarotInsight-Windows-exe
          path: dist/TarotInsight/
          retention-days: 30
